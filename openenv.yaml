name: "code-review-agent"
benchmark_name: "openenv-v1"
version: "1.0.0"
description: "A Code Review Simulation Environment evaluating AI agents on PR reviews."

action_model:
  type: "json"
  schema:
    action_type: "string"
    description: "string"

observation_model:
  type: "json"
  schema:
    pr_id: "string"
    code: "string"
    status: "string"

interface:
  reset:
    method: "POST"
    endpoint: "/reset"
  step:
    method: "POST"
    endpoint: "/step"

tasks:
  - id: "easy"
    description: "Detect basic syntax and logic errors."
  - id: "medium"
    description: "Detect security and performance issues."
  - id: "hard"
    description: "Detect concurrency and architecture bugs."

limits:
  max_steps: 10
  timeout: 30
